<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Бонусная карта</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #f6f2ea;
      --card: #ffffff;
      --text: #222222;
      --muted: #777777;
      --button: #222222;
      --button-text: #ffffff;
      --secondary: #e8dfd0;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      background: var(--card);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 12px;
      line-height: 1.1;
    }

    p {
      line-height: 1.4;
    }

    .bonus {
      font-size: 44px;
      font-weight: bold;
      margin: 12px 0 4px;
    }

    .qr {
      width: 180px;
      height: 180px;
      border-radius: 24px;
      background: repeating-linear-gradient(
        45deg,
        #222,
        #222 8px,
        #fff 8px,
        #fff 16px
      );
      margin: 24px auto 12px;
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      background: var(--button);
      color: var(--button-text);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .button.secondary {
      background: var(--secondary);
      color: var(--text);
      margin-top: 12px;
    }

    .status {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: #fff7df;
      font-size: 14px;
      line-height: 1.4;
      display: none;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="card">
      <div class="label">Ваша бонусная карта</div>
      <h1 id="title">Добро пожаловать!</h1>
      <p id="subtitle">Поделитесь номером телефона, чтобы мы нашли вашу карту лояльности.</p>

      <div class="bonus">0</div>
      <div class="label">баллов на счете</div>

      <div class="qr"></div>

      <p class="small">
        Покажите этот QR-код на кассе, чтобы начислить или списать бонусы.
      </p>
    </div>

    <button class="button" onclick="sharePhone()">
      Поделиться номером телефона
    </button>

    <button class="button secondary" onclick="showInfo()">
      Как это работает?
    </button>

    <div class="status" id="statusBox"></div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    const statusBox = document.getElementById("statusBox");
    const title = document.getElementById("title");

    if (tg) {
      tg.ready();
      tg.expand();

      const user = tg.initDataUnsafe && tg.initDataUnsafe.user;

      if (user && user.first_name) {
        title.textContent = `Привет, ${user.first_name}!`;
      }
    }

    function showStatus(text) {
      statusBox.style.display = "block";
      statusBox.textContent = text;
    }

    function sharePhone() {
      if (!tg) {
        showStatus("Откройте приложение внутри Telegram, чтобы поделиться номером телефона.");
        return;
      }

      if (!tg.requestContact) {
        showStatus("В вашей версии Telegram запрос номера может не поддерживаться. Обновите приложение Telegram и попробуйте снова.");
        return;
      }

      tg.requestContact(function(shared) {
        if (shared) {
          showStatus("Спасибо! Номер отправлен боту. Следующий шаг — подключим сервер, чтобы сохранить номер и найти вашу карту в iiko.");
        } else {
          showStatus("Вы не поделились номером. Без номера мы не сможем найти вашу бонусную карту.");
        }
      });
    }

    function showInfo() {
      showStatus("Сейчас это тестовая версия. Дальше мы подключим базу гостей и iiko, чтобы здесь отображались реальные баллы.");
    }
  </script>
</body>
</html>
